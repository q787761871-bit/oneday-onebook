title: oneday-onebook
tagline: 每天一本书的机理式还原
description: >-
  人无法感知到认知以外的事情。每天补一本书的「思想 + 方法论」，
  扩展大脑「范畴仓库」的量级。

theme: minima

permalink: /:year/:month/:day/:slug/

# 允许发布日期在未来的 post（GitHub Pages 服务器时区 UTC，常导致今天的 post 被跳过）
future: true
timezone: Asia/Shanghai

plugins:
  - jekyll-feed
  - jekyll-seo-tag

# 排除非内容文件
exclude:
  - scripts/
  - data/
  - prompts/
  - examples/
  - docs/
  - README.md
  - LICENSE
  - "*.py"
  - node_modules/
  - .gitignore
  - bestblogs-feishu-full.md
  - TODO.md

# minima 主题配置
minima:
  date_format: "%Y-%m-%d"
  social_links:
    github: q787761871-bit/oneday-onebook
